server:
  port: 8080

spring:
  application:
    name: mini-bitly
  datasource:
    url: jdbc:postgresql://localhost:5432/minibitly
    username: minibitly
    password: minibitly
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info
